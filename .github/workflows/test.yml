name: Test PinnR

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@a81bbbf8298c0fa03ea29cdc473d45769f953675 # v4.2.2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make pinnr.sh executable
        run: chmod +x pinnr.sh

      - name: Run PinnR in scan mode
        run: ./pinnr.sh -S

      - name: Verify exit code
        if: failure()
        run: |
          echo "::error::PinnR scan found unpinned or outdated actions!"
          echo "Run 'pinnr -U' locally to update all actions to latest versions."
          exit 1
